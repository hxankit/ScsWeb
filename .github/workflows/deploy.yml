name: 🚀 Deploy Fullstack App to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Install backend dependencies (root)
        run: npm install

      - name: 🧩 Install frontend dependencies
        working-directory: ./Frontend
        run: npm install

      - name: ⚙️ Build frontend
        run: npm run build:frontend

      - name: 🗜️ Zip full project for Azure deployment
        run: zip -r scs-app.zip .

      - name: 🚀 Deploy to Azure via ZipDeploy
        run: |
          curl -X POST https://${{ secrets.AZURE_APP_NAME }}.mexicocentral-01.azurewebsites.net/api/zipdeploy \
            --user ${{ secrets.AZURE_DEPLOY_USER }}:${{ secrets.AZURE_DEPLOY_PASSWORD }} \
            --data-binary @scs-app.zip
