name: Deploy Fullstack App to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install frontend dependencies
        working-directory: ./Frontend
        run: npm install

      - name: Build frontend
        working-directory: ./Frontend
        run: npm run build

      - name: Install backend dependencies
        run: npm install --production

      - name: Zip entire project (includes Frontend & Backend)
        run: zip -r scs-app.zip .

      - name: Deploy via ZipDeploy to Azure Web App
        run: |
          curl -X POST https://${{ secrets.AZURE_APP_NAME }}.canadacentral-01.azurewebsites.net/api/zipdeploy \
          --user ${{ secrets.AZURE_DEPLOY_USER }}:${{ secrets.AZURE_DEPLOY_PASSWORD }} \
          --data-binary @scs-app.zip
